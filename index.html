<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S7-1200 指令记忆配对 · 电气控制PLC游戏学堂</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0b2a3e 0%, #1a4b6d 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-wrapper {
            max-width: 950px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 24px 24px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        h1 {
            text-align: center;
            font-weight: 600;
            font-size: 2.2rem;
            margin: 0 0 8px;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 4px 8px #00000040, 0 0 8px #7fc9ff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        h1 span {
            background: #fedb5f;
            color: #1a3f5a;
            font-size: 1.3rem;
            font-weight: 600;
            padding: 6px 18px;
            border-radius: 60px;
            box-shadow: inset 0 -2px 0 #a57c2e, 0 6px 0 #0f2a3b;
            transform: translateY(-3px);
            text-shadow: none;
        }
        .subhead {
            text-align: center;
            color: #d9edff;
            font-size: 1.2rem;
            margin: 0 0 24px;
            background: #113750b3;
            padding: 12px 24px;
            border-radius: 60px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(4px);
            border: 1px solid #88c8ff;
            font-weight: 500;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #082433;
            border-radius: 80px;
            padding: 10px 25px;
            margin-bottom: 30px;
            color: white;
            border: 1px solid #3b8fc2;
            box-shadow: 0 6px 0 #042130;
        }
        .pairs-counter {
            background: #fee7a0;
            color: #1f4a6e;
            font-weight: 700;
            font-size: 1.3rem;
            padding: 5px 25px;
            border-radius: 50px;
            border: 2px solid #ffffff;
        }
        .win-message {
            background: #80dd77;
            color: #003d1d;
            font-weight: 700;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.3rem;
            transition: all 0.2s;
            border: 2px solid white;
            text-shadow: 0 1px 0 white;
        }
        .reset-btn {
            background: #ffb554;
            border: none;
            color: #1f3a4b;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 10px 30px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 7px 0 #9e5f1a, 0 4px 12px black;
            transition: 0.08s linear;
            border: 2px solid #ffeacb;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .reset-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #9e5f1a, 0 6px 12px black;
        }
        .reset-btn:hover {
            background: #ffa42b;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            justify-content: center;
            margin: 20px 0 15px;
        }
        .card {
            background: #254e70;
            border: 3px solid #ffd966;
            border-radius: 24px;
            aspect-ratio: 1 / 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 12px 8px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            box-shadow: 0 12px 0 #0f2a3b, 0 5px 15px rgba(0, 0, 0, 0.6);
            transition: 0.1s ease;
            cursor: pointer;
            word-break: break-word;
            line-height: 1.4;
            position: relative;
            user-select: none;
        }
        .card.matched {
            background: #2e8b6c;
            border-color: #b9ffb1;
            box-shadow: 0 6px 0 #1a513f, 0 5px 15px black;
            transform: translateY(4px);
            cursor: default;
            color: #f6ffd2;
            filter: drop-shadow(0 0 6px #a3ffb4);
        }
        .card.flipped:not(.matched) {
            background: #ffcf8a;
            border-color: #ffffff;
            color: #1f443b;
            font-weight: 600;
            box-shadow: 0 8px 0 #b2702e, 0 5px 15px black;
            transform: translateY(2px);
        }
        .card:not(.flipped):not(.matched) {
            background: #113955;
            border-color: #6fa9d3;
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 400;
            text-shadow: 0 2px 0 black;
        }
        .card:not(.flipped):not(.matched):hover {
            background: #1b4f73;
            border-color: #ffe484;
            transform: translateY(2px);
            box-shadow: 0 8px 0 #0f2a3b;
        }
        .card.matched:hover {
            cursor: default;
        }
        .footer-note {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            color: #ceeaff;
            font-weight: 500;
            background: #00000040;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px dashed #8cc9ff;
            font-size: 1.1rem;
        }
        .footer-note i {
            font-style: normal;
            color: #fedb5f;
            margin: 0 6px;
        }
        .win-badge {
            background: #fdffb3;
            color: #005c27;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.5rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); background: #fdffb3; }
            50% { transform: scale(1.02); background: #f3ff87; box-shadow: 0 0 20px #f9ffb0; }
        }
        /* 移动端适应 */
        @media (max-width: 650px) {
            .grid-container { gap: 8px; }
            .card { font-size: 0.85rem; padding: 6px 3px; }
            h1 { font-size: 1.8rem; }
            .reset-btn { padding: 8px 18px; font-size: 1rem; }
        }
        @media (max-width: 450px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
            .stats-bar { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <h1>
        ⚡ PLC 指令记忆配对
        <span>S7-1200</span>
    </h1>
    <div style="text-align: center;">
        <div class="subhead">⚙️ 定时器 · 计数器 · 比较 · 加减法 · 边沿检测</div>
    </div>

    <!-- 状态栏 -->
    <div class="stats-bar">
        <div class="pairs-counter" id="pairs-count">0 / 8 配对</div>
        <div id="win-message-area" style="min-width: 160px; text-align: center;"></div>
        <button class="reset-btn" id="reset-game">
            🔄 洗牌重开
        </button>
    </div>

    <!-- 卡片网格 -->
    <div id="card-grid" class="grid-container"></div>

    <!-- 小提示 -->
    <div class="footer-note">
        <span>🔍 点击卡片：找出指令与含义 —— 配成一对即锁定✔️</span>
    </div>
</div>

<script>
(function() {
    // ---------- 指令对数据 (S7-1200 常用) ----------
    const PAIRS = [
        {
            name: "TON",
            desc: "接通延时定时器 (输入ON后延迟一段时间输出ON)"
        },
        {
            name: "CTU",
            desc: "加计数器 (每次计数输入从0变1，计数值+1)"
        },
        {
            name: "CTD",
            desc: "减计数器 (每次计数输入从0变1，计数值-1)"
        },
        {
            name: "CMP",
            desc: "比较指令 (比较两个数值：等于、大于、小于等)"
        },
        {
            name: "ADD",
            desc: "加法指令 (将两个数值相加，结果存入指定地址)"
        },
        {
            name: "SUB",
            desc: "减法指令 (将两个数值相减)"
        },
        {
            name: "R_TRIG",
            desc: "上升沿检测 (检测信号从0→1的时刻，仅一个扫描周期)"
        },
        {
            name: "F_TRIG",
            desc: "下降沿检测 (检测信号从1→0的时刻，仅一个扫描周期)"
        }
    ];

    // ---------- 全局变量 ----------
    let cards = [];                // 卡片对象数组 { pairId, content, matched, flipped }
    let openIndex = null;          // 当前翻开的第一张卡片索引
    let lock = false;              // 是否锁定界面 (等待翻转归位)
    let flipTimer = null;          // 失败定时器
    const grid = document.getElementById('card-grid');
    const pairsCountSpan = document.getElementById('pairs-count');
    const winMsgArea = document.getElementById('win-message-area');

    // ---------- 辅助：从PAIRS构建卡片数组并打乱 ----------
    function buildCards() {
        const newCards = [];
        PAIRS.forEach((pair, idx) => {
            // 添加指令名称卡片
            newCards.push({
                pairId: idx,
                content: pair.name,
                matched: false,
                flipped: false
            });
            // 添加描述卡片
            newCards.push({
                pairId: idx,
                content: pair.desc,
                matched: false,
                flipped: false
            });
        });
        // 随机打乱 (Fisher–Yates)
        for (let i = newCards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newCards[i], newCards[j]] = [newCards[j], newCards[i]];
        }
        return newCards;
    }

    // ---------- 重置游戏 ----------
    function resetGame() {
        // 清除之前的定时器
        if (flipTimer) {
            clearTimeout(flipTimer);
            flipTimer = null;
        }
        // 重置全局状态
        openIndex = null;
        lock = false;
        cards = buildCards();
        render();
    }

    // ---------- 统计已匹配的对数 ----------
    function countMatchedPairs() {
        // 统计已经配对的pairId (matched为true的数量除以2)
        const matchedSet = new Set();
        cards.forEach(card => {
            if (card.matched) matchedSet.add(card.pairId);
        });
        return matchedSet.size;
    }

    // ---------- 检查是否全部完成 ----------
    function checkAllMatched() {
        const matchedCount = countMatchedPairs();
        if (matchedCount === PAIRS.length) {
            winMsgArea.innerHTML = '<span class="win-badge">🎉 全配对成功! 🎉</span>';
        } else {
            winMsgArea.innerHTML = ''; // 清空胜利信息
        }
        pairsCountSpan.innerText = `${matchedCount} / ${PAIRS.length}`;
    }

    // ---------- 渲染网格 (基于cards数组) ----------
    function render() {
        let html = '';
        cards.forEach((card, index) => {
            // 确定卡片样式类
            let classNames = 'card';
            if (card.matched) classNames += ' matched';
            else if (card.flipped) classNames += ' flipped';
            // 显示内容：若已匹配 或 翻开 则显示content，否则显示问号
            const displayContent = (card.matched || card.flipped) ? card.content : '?';
            // 注意：如果是背面显示大问号，用特殊样式
            html += `<div class="${classNames}" data-index="${index}">${displayContent}</div>`;
        });
        grid.innerHTML = html;
        checkAllMatched();
    }

    // ---------- 处理卡片点击 (事件代理) ----------
    function handleCardClick(e) {
        // 找到实际的卡片div (点击可能发生在内部文本，但target就是div)
        const cardDiv = e.target.closest('.card');
        if (!cardDiv) return;

        // 如果界面锁定 或者 没有data-index 则忽略
        if (lock) return;

        const index = parseInt(cardDiv.dataset.index, 10);
        if (isNaN(index) || index < 0 || index >= cards.length) return;

        const currentCard = cards[index];

        // 如果卡片已匹配 或 已翻开(但未匹配) 则不能点击 (已翻开卡片不能重复点)
        if (currentCard.matched || currentCard.flipped) return;

        // ----- 没有翻开的第一张 -----
        if (openIndex === null) {
            // 翻开当前卡片
            currentCard.flipped = true;
            openIndex = index;
            render();
            return;
        }

        // ----- 已经有一张翻开 (openIndex) ，处理第二张 -----
        // 不允许点击和第一张相同
        if (openIndex === index) return;

        const firstCard = cards[openIndex];

        // 先将第二张翻开 (显示内容)
        currentCard.flipped = true;
        render(); // 立即显示两张翻开的状态

        // 检查配对 (比较pairId)
        if (firstCard.pairId === currentCard.pairId) {
            // 配对成功 -> 永久匹配
            firstCard.matched = true;
            currentCard.matched = true;
            // 保持flipped为true (但matched会覆盖样式，同时不再可点)
            firstCard.flipped = true;   // 其实matched已经足够，但保留flipped无影响
            currentCard.flipped = true;
            openIndex = null;            // 清除翻开索引
            render();
        } else {
            // 配对失败: 锁定界面，准备0.8秒后翻回
            lock = true;

            // 设置定时器翻回这两张
            if (flipTimer) clearTimeout(flipTimer);
            flipTimer = setTimeout(() => {
                // 注意: 在定时器执行期间，可能游戏已经被重置，需要确保卡片对象还存在
                // 并且这两张卡如果没被匹配（可能奇迹？）才翻回
                if (cards[openIndex] && cards[index]) {
                    // 只有没有被匹配的卡片才翻回 (防止在极端情况被其他操作篡改)
                    if (!cards[openIndex].matched) cards[openIndex].flipped = false;
                    if (!cards[index].matched) cards[index].flipped = false;
                }
                openIndex = null;
                lock = false;
                flipTimer = null;
                render();
            }, 800);
            // 注意：此时openIndex还未清除，但lock=true防止新点击，暂存。但定时器里要使用openIndex和index，所以必须在回调里引用正确的索引。
            // 但如果在定时器触发前用户点击了重置，重置会清除定时器并重建cards，因此openIndex可能会指向失效索引。故需要重置时清除定时器并将openIndex置空。
            // 重置函数里已经清理定时器并重新初始化，不会有问题。
        }
    }

    // ---------- 事件绑定 ----------
    grid.addEventListener('click', handleCardClick);

    document.getElementById('reset-game').addEventListener('click', () => {
        resetGame();
    });

    // ---------- 初始化 ----------
    cards = buildCards();
    render();

    // 额外：以防在定时器未执行时重置导致状态混乱，但重置已经清理定时器，没问题。
})();
</script>
</body>
</html>
